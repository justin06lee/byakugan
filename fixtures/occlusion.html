<!DOCTYPE html>
<html><head><title>Occlusion Fixture</title>
<style>
  #panel { position: fixed; top: 0; left: 0; width: 900px; height: 700px;
           background: #ffffff; border: 1px solid #ccc; padding: 20px; }
</style></head>
<body>
  <h1>Underneath</h1>
  <button id="under" style="position:absolute; top:100px; left:100px">Hidden under panel</button>
  <a href="#peek" style="position:absolute; top:300px; left:1000px">Peeking out</a>
  <div id="panel">

    <button id="panel-btn">Panel button</button>
  </div>
</body></html>
