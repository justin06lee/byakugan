<!DOCTYPE html>
<html><head><title>List Fixture</title></head>
<body>
  <h1>Search results</h1>
  <ul id="results"></ul>
  <script>
    const ul = document.getElementById('results');
    for (let i = 1; i <= 20; i++) {
      const li = document.createElement('li');
      li.innerHTML = `<a class="result" href="#item/${i}">Result item number ${i}</a>`;
      ul.appendChild(li);
    }
  </script>
</body></html>
